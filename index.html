const SPOT_ACCENT = '#5E0ED7';

function SpotlightReveal({ imageSrc, revealSrc, baseRadius = 420 }) {
  const NUM_TRAILS = 6;
  const pointsRef = React.useRef(
    Array.from({ length: NUM_TRAILS }, () => ({ x: -1000, y: -1000 }))
  );

  React.useEffect(() => {
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    const onMove = (e) => { targetX = e.clientX; targetY = e.clientY; };
    const onTouch = (e) => {
      if (e.touches && e.touches[0]) { targetX = e.touches[0].clientX; targetY = e.touches[0].clientY; }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onTouch, { passive: true });

    let raf;
    const animate = () => {
      const p = pointsRef.current;
      p[0].x += (targetX - p[0].x) * 0.2;
      p[0].y += (targetY - p[0].y) * 0.2;
      for (let i = 1; i < p.length; i++) {
        p[i].x += (p[i - 1].x - p[i].x) * 0.35;
        p[i].y += (p[i - 1].y - p[i].y) * 0.35;
      }
      for (let i = 0; i < p.length; i++) {
        const c = document.getElementById(`trail-${i}`);
        if (c) { c.setAttribute('cx', p[i].x.toString()); c.setAttribute('cy', p[i].y.toString()); }
      }
      raf = requestAnimationFrame(animate);
    };
    animate();
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onTouch);
      cancelAnimationFrame(raf);
    };
  }, []);

  return (
    <div className="absolute inset-0 w-full h-full z-0 bg-black pointer-events-none overflow-hidden flex items-center justify-center">
      <img
        src={revealSrc}
        alt=""
        className="absolute inset-0 w-full h-full object-contain object-center"
      />
      <svg className="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="holeGradient">
            <stop offset="0%" stopColor="black" stopOpacity="1" />
            <stop offset="60%" stopColor="black" stopOpacity="0.8" />
            <stop offset="100%" stopColor="black" stopOpacity="0" />
          </radialGradient>
          <mask id="spotlight-mask" maskContentUnits="userSpaceOnUse" x="0" y="0" width="100%" height="100%">
            <rect width="100%" height="100%" fill="white" />
            {Array.from({ length: NUM_TRAILS }).map((_, i) => (
              <circle
                key={`trail-${i}`}
                id={`trail-${i}`}
                cx="-1000"
                cy="-1000"
                r={baseRadius - i * 35}
                fill="url(#holeGradient)"
                opacity={1 - i * 0.15}
              />
            ))}
          </mask>
        </defs>
        <image
          href={imageSrc}
          width="100%"
          height="100%"
          preserveAspectRatio="xMidYMid slice"
          mask="url(#spotlight-mask)"
        />
      </svg>
    </div>
  );
}
