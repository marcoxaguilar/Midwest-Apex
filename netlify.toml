# Midwest Apex — static site (plain HTML/CSS/JS, no build step)

[build]
  publish = "."          # serve the folder as-is from the repo/upload root
  command = ""           # no build — nothing to compile

# Netlify serves "pretty"/clean URLs out of the box:
#   /seo-checker  ->  seo-checker.html
#   /clientele    ->  clientele.html
# Your existing explicit ".html" links keep working too.

# Long-cache the fingerprint-free image assets (safe: filenames are stable).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep the HTML and the client-logo sidecar always fresh so updates show up.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/.image-slots.state.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/json"

# A custom 404.html (below) is served automatically for unknown paths.
# No SPA catch-all redirect on purpose — this is a multi-page site, so a
# blanket redirect to index.html would mask real 404s.
