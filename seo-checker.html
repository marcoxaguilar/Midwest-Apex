/* ---------------- Score ring ---------------- */
function ScoreRing({ value, size = 132, stroke = 9, show }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = show ? value / 100 : 0;
  const color = value >= 80 ? '#A06BF5' : value >= 55 ? '#7B3FE4' : '#5E0ED7';
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle className="score-track" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} />
        <circle className="score-prog" cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
                strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c - c*pct} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-firs font-semibold text-white leading-none" style={{ fontSize: size*0.30 }}>{show ? value : 0}</span>
        <span className="text-[10px] tracking-[0.22em] uppercase text-white/45 mt-1">/ 100</span>
      </div>
    </div>
  );
}

/* ---------------- Category card ---------------- */
function MetricCard({ icon: I, label, score, note, show, delay }) {
  const color = score >= 80 ? '#A06BF5' : score >= 55 ? '#C9A6FF' : '#F0B5B5';
  return (
    <motion.div
      initial={{ opacity: 0, y: 24 }}
      animate={show ? { opacity: 1, y: 0 } : {}}
      transition={{ duration: 0.6, delay, ease: EASE }}
      className="liquid-glass rounded-2xl p-5 flex flex-col gap-3">
      <div className="flex items-center justify-between">
        <span className="w-9 h-9 rounded-full flex items-center justify-center text-accent2" style={{ background:'rgba(160,107,245,0.12)' }}><I size={18} /></span>
        <span className="font-firs text-2xl font-semibold" style={{ color }}>{show ? score : '—'}</span>
      </div>
      <div>
        <p className="text-[11px] uppercase tracking-[0.18em] text-white/45">{label}</p>
        <p className="text-[13px] text-white/70 leading-snug mt-1">{note}</p>
      </div>
    </motion.div>
  );
}

/* ---------------- The checker tool ---------------- */
function Checker() {
  const [url, setUrl] = useState('');
  const [state, setState] = useState('idle'); // idle | scanning | done
  const overall = 69;

  const run = () => {
    if (!url.trim()) { setUrl('yourbusiness.com'); }
    setState('scanning');
    setTimeout(() => setState('done'), 1700);
  };

  const show = state === 'done';

  return (
    <section className="w-full">

          See where you <span className="grad-text">rank</span>

        <p className="mt-6 text-[17px] sm:text-[19px] leading-[1.5] text-white/70">

      {/* Input bar */}
      <motion.div
        initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }}
        transition={{ duration: 0.9, delay: 0.15, ease: EASE }}
        className={"liquid-glass rounded-2xl mt-10 max-w-2xl mx-auto p-2.5 flex items-center gap-2 " + (state==='scanning' ? 'scanning' : '')}>
        <span className="pl-3 text-white/45"><Ico.Search size={20} /></span>
        <input
          value={url}
          onChange={(e) => setUrl(e.target.value)}

          placeholder="yourbusiness.com"

        <button onClick={run}

      </motion.div>
      <p className="text-center text-[12px] text-white/35 mt-4 tracking-wide">No signup • No card • Results in ~15 seconds</p>

      {/* Results */}
      <AnimatePresence>
        {state !== 'idle' && (
          <motion.div
            initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, ease: EASE }}
            className="mt-14 grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

            {/* Overall + wins */}
            <div className="liquid-glass rounded-3xl p-7 lg:col-span-1 flex flex-col items-center">
              <div className="relative">
                <ScoreRing value={overall} show={show} />
                {state === 'scanning' && (
                  <div className="absolute inset-0 overflow-hidden rounded-full pointer-events-none">
                    <div className="scan-bar absolute left-0 right-0 h-1/3" style={{ background:'linear-gradient(to bottom, rgba(160,107,245,0), rgba(160,107,245,0.5), rgba(160,107,245,0))' }}></div>
                  </div>
                )}
              </div>
              <p className="font-firs text-lg font-semibold text-white mt-4 uppercase tracking-wide">{show ? 'Decent — fixable' : 'Analyzing…'}</p>
              <p className="text-[13px] text-white/55 text-center mt-1 max-w-[230px]">{show ? 'You\u2019re leaving rankings on the table. Five quick wins below.' : 'Crawling pages & scoring signals.'}</p>

              <div className="w-full mt-6 flex flex-col gap-2.5">
                {WINS.map((w, i) => (
                  <motion.div key={i}
                    initial={{ opacity: 0, x: -10 }}
                    animate={show ? { opacity: 1, x: 0 } : {}}
                    transition={{ duration: 0.4, delay: 0.3 + i*0.08, ease: EASE }}
                    className="flex items-start gap-2.5 text-[13px] min-w-0">
                    <span className={"mt-0.5 shrink-0 " + (w.ok ? 'text-accent2' : 'text-rose-300/80')}>{w.ok ? <Ico.Check/> : <Ico.Alert/>}</span>
                    <span className={"min-w-0 " + (w.ok ? 'text-white/75' : 'text-white/60')}>{w.t}</span>
                  </motion.div>
                ))}
              </div>
            </div>

            {/* Category grid */}
            <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-5">
              {METRICS.map((m, i) => (
                <MetricCard key={m.label} icon={m.icon} label={m.label} score={m.score} note={m.note} show={show} delay={0.25 + i*0.08} />
              ))}
              <div className="sm:col-span-2 liquid-glass rounded-2xl p-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-5">
                <div>
                  <p className="font-firs text-xl font-semibold text-white uppercase tracking-wide">Want the full report + a plan?</p>
                  <p className="text-[14px] text-white/60 mt-1">We'll fix every red flag and rank you where it counts.</p>
                </div>
                <a href="tel:+12243054785" className="cta-group clip-btn shrink-0 inline-flex items-center gap-2 bg-white text-black px-6 py-4 text-[15px] font-semibold uppercase tracking-wide">
                  Work With Us <Ico.ArrowUpRight size={18} className="cta-arrow" />
                </a>
              </div>
            </div>
          </motion.div>
        )}
      </AnimatePresence>
    </section>
  );
}
